services:
  - type: web
    name: ai-interviewer
    env: node
    plan: starter
    buildCommand: "npm install && npx prisma generate && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard manually!
      - key: REDIS_URL
        sync: false
